# Benchmark (locked): PCPG-MC (pc_reinforce) on HalfCheetah bench tier -- no critic.
# optimizer x activation: adam + tanh
env:
  env_name: "halfcheetah"
  num_envs: 256
  episode_length: 1000

train:
  total_steps: 1_000_000
  rollout_length: 256
  gamma: 0.99
  optimizer: "adam"
  learning_rate: 3.0e-4
  target_scale: 1.0
  max_t1: 20
  pc_steps_per_update: 1
  update_epochs: 2
  num_minibatches: 4
  normalize_advantages: true
  normalize_rewards: true
  eval_every: 2
  num_eval_episodes: 10

agent:
  algorithm: "pc_reinforce"
  experiment_name: "pc_reinforce_adam_tanh"
  act_fn: "tanh"
  width: 64
  depth: 2
  exp_std: true

wandb:
  mode: disabled
  project: "mujoco-pcpg"
  group: null

seed: 1
