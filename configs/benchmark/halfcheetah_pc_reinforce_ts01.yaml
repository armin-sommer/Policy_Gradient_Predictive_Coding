# Benchmark (locked): PCPG-MC (pc_reinforce) on HalfCheetah bench tier -- no critic.
# target_scale sweep on sgd+tanh: 0.1
env:
  env_name: "halfcheetah"
  num_envs: 256
  episode_length: 1000

train:
  total_steps: 1_000_000
  rollout_length: 256
  gamma: 0.99
  optimizer: "sgd"
  learning_rate: 0.03
  target_scale: 0.1
  max_t1: 20
  pc_steps_per_update: 1
  update_epochs: 2
  num_minibatches: 4
  normalize_advantages: true
  normalize_rewards: true
  eval_every: 2
  num_eval_episodes: 10

agent:
  algorithm: "pc_reinforce"
  experiment_name: "pc_reinforce_ts01"
  act_fn: "tanh"
  width: 64
  depth: 2
  exp_std: true

wandb:
  mode: disabled
  project: "mujoco-pcpg"
  group: null

seed: 1
