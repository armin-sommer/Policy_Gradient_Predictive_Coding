# Gaussian PCPG actor-critic — Hopper SOTA tier ([256,256], 1024 envs, 5M steps).
# GAE bootstraps through the rollout boundary, so short rollouts are fine.
env:
  env_name: "hopper"
  num_envs: 1024
  episode_length: 1000

train:
  total_steps: 5_000_000
  rollout_length: 32
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 3.0e-4
  value_learning_rate: 3.0e-4
  target_scale: 1.0
  max_t1: 20
  pc_steps_per_update: 1
  update_epochs: 2
  num_minibatches: 4
  normalize_advantages: true
  normalize_rewards: true
  eval_every: 10
  num_eval_episodes: 10

agent:
  algorithm: "pc_actor_critic"
  experiment_name: "pc_actor_critic_mujoco_sota"
  width: 256
  depth: 2
  exp_std: true

wandb:
  mode: disabled
  project: "mujoco-pcpg"
  group: null

seed: 1
