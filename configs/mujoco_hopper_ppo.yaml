# SOTA PPO — Brax/MJX Hopper. Same recipe as HalfCheetah, env swapped.
env:
  env_name: "hopper"
  num_envs: 1024
  episode_length: 1000

train:
  total_steps: 30_000_000
  rollout_length: 20
  batch_size: 32
  num_minibatches: 32        # batch_size * num_minibatches = 1024 = num_envs
  update_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  learning_rate: 3.0e-4
  anneal_lr: true
  max_grad_norm: 0.5
  adam_eps: 1.0e-5
  normalize_rewards: true
  eval_every: 50             # PPO does ~1.5k updates -> keep eval sparse

agent:
  algorithm: "ppo"
  network: "mlp"
  policy_hidden_layer_sizes: [256, 256]
  value_hidden_layer_sizes: [256, 256]
  sota_init: true

wandb:
  mode: disabled
  project: "mujoco-pcpg"
  group: null

seed: 1
