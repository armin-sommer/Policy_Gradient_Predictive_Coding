env:
  env_name: "coinrun"               


  num_train_levels: 200             
  distribution_mode: "easy"         # "easy" or "hard"
  num_envs: 64                      # CleanRL Procgen PPO default

train:
  total_steps: 25_000_000
  rollout_length: 256
  batch_size: 8                     # batch_size * num_minibatches must be divisible by env.num_envs
  num_minibatches: 8
  update_epochs: 3
  gamma: 0.999
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  learning_rate: 5.0e-4
  max_grad_norm: 0.5

agent:
  algorithm: "ppo"
  network: "impala_cnn"             # the de-facto Procgen backbone

logging:

wandb:
  mode: disabled
  project: "procgen-ppo"
  group: null

seed: 42