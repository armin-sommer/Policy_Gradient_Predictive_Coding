# Gaussian PCPG actor-critic on Brax Hopper (bench tier alias — see _bench.yaml).
env:
  env_name: "hopper"
  num_envs: 256
  episode_length: 1000

train:
  total_steps: 1_000_000
  rollout_length: 32
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 1.0e-3
  value_learning_rate: 1.0e-3
  target_scale: 1.0
  max_t1: 20
  pc_steps_per_update: 1
  update_epochs: 4
  num_minibatches: 8
  normalize_advantages: true
  normalize_rewards: true
  eval_every: 10
  num_eval_episodes: 10

agent:
  algorithm: "pc_actor_critic"
  experiment_name: "pc_actor_critic_mujoco_bench"
  width: 64
  depth: 2
  exp_std: true

wandb:
  mode: disabled
  project: "mujoco-pcpg"
  group: null

seed: 1
