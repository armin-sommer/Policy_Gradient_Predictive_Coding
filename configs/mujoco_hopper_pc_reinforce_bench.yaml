# Gaussian PCPG-MC — Hopper bench tier ([64,64], 256 envs, 1M steps).
# Long rollouts: MC returns are truncated at the rollout boundary (no value
# bootstrap), so unroll must cover the effective horizon (~100 steps at
# gamma=0.99). 256 envs x 256 steps = 65,536 env steps per update.
env:
  env_name: "hopper"
  num_envs: 256
  episode_length: 1000

train:
  total_steps: 1_000_000
  rollout_length: 256
  gamma: 0.99
  learning_rate: 1.0e-3
  target_scale: 1.0
  max_t1: 20
  pc_steps_per_update: 1
  update_epochs: 4
  num_minibatches: 8
  normalize_advantages: true
  normalize_rewards: true
  eval_every: 2
  num_eval_episodes: 10

agent:
  algorithm: "pc_reinforce"
  experiment_name: "pc_reinforce_mujoco_bench"
  width: 64
  depth: 2
  exp_std: true

wandb:
  mode: disabled
  project: "mujoco-pcpg"
  group: null

seed: 1
